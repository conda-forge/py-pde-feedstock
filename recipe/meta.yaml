{% set name = "py-pde" %}
{% set version = "0.53.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py_pde-{{ version }}.tar.gz
  sha256: 10b18fc1e11dfd01bf15ec18a70bb1b04fd8b7e87be113657ad099c7a7d6d3d0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps . -vvv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools_scm
  run:
    - ffmpeg
    - h5py >=2.10
    - ipywidgets >=8
    - matplotlib-base >=3.1
    - numba >=0.59
    - numpy >=2.0
    - pandas >=2
    - python >={{ python_min }},<3.15
    - scipy >=1.10
    - sympy >=1.9
    - tqdm >=4.66
    - typing_extensions >=4.10

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    # If some dependency pulls in a third-party `importlib`, remove it before imports run
    - python -c "import sys, subprocess; subprocess.run([sys.executable,'-m','pip','uninstall','-y','importlib'], check=False)"

    # Verify stdlib importlib is being used
    - python -c "import importlib; print('importlib file:', getattr(importlib,'__file__', None)); import importlib.util; print('importlib.util OK')"

    # Now run the import checks (these used to be in `imports:`)
    - python -c "import pde; import pde.fields; import pde.grids; import pde.pdes; import pde.solvers; import pde.storage; import pde.visualization"

    - pip check
    - pip list | grep -i {{ name }} | grep {{ version }}

about:
  home: https://github.com/zwicker-group/py-pde
  summary: Python package for solving partial differential equations
  license: MIT
  license_file: LICENSE
  doc_url: https://py-pde.readthedocs.io
  description: |
    py-pde is a Python package for solving partial differential equations (PDEs).
    The package provides classes for grids on which scalar and tensor fields can be defined.
    The associated differential operators are computed using a numba-compiled implementation of finite differences.
    This allows defining, inspecting, and solving typical PDEs that appear for instance in the study of dynamical systems in physics.
    The focus of the package lies on easy usage to explore the behavior of PDEs.
    However, core computations can be compiled transparently using numba for speed.

extra:
  recipe-maintainers:
    - volpatto
    - david-zwicker
